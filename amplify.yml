# AWS Amplify: console env vars are not available to Next.js SSR/API by default.
# Copy DB_* and SESSION_* into .env.production before build so server code can read them at runtime.
# https://docs.aws.amazon.com/amplify/latest/userguide/ssr-environment-variables.html
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Next.js SSR on Amplify needs DB_* in .env.production at build time (see AWS SSR env docs).
        - node scripts/write-amplify-env.cjs
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
